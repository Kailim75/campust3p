<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security Headers (set at edge/CDN for prod — meta fallback) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()" />

    <!--
      Content-Security-Policy in REPORT-ONLY mode.
      Logs violations in the browser console / dev-tools "Issues" panel
      without blocking anything. Once we've validated zero false-positive in
      production traffic, switch the meta name to "Content-Security-Policy"
      to actually enforce it.
    -->
    <meta http-equiv="Content-Security-Policy-Report-Only" content="default-src 'self' https://*.supabase.co; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co https://api.getalma.eu https://api.sandbox.getalma.eu; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" />

    <title>T3P Campus — Formation Management System</title>
    <meta name="description" content="Plateforme SaaS premium pour la gestion de centres de formation professionnelle" />
    <meta name="author" content="T3P Campus" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1E5068" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="T3P Campus" />
    
    <!-- iOS Splash Screens -->
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="T3P Campus — Formation Management System" />
    <meta property="og:description" content="Plateforme SaaS premium pour la gestion de centres de formation professionnelle" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-512x512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="T3P Campus" />
    <meta name="twitter:image" content="/pwa-512x512.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
